<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schülerzeitung Info Screen</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="screen-container">
        <div class="paper">
            <div class="content-grid">
                <!-- Left Sidebar: Header & Images -->
                <aside class="column-left">
                    <!-- Top Logos Area -->
                    <div class="top-logos">
                        <div class="logo-wrapper kaktus">
                            <img src="kaktus-logo.png" alt="Kaktus Schülerblog Logo">
                        </div>
                        <div class="logo-wrapper school">
                            <img src="school-logo.png" alt="Gymnasium BZM Markdorf Logo">
                        </div>
                    </div>

                    <div class="header-section">
                        <h1 class="headline">Die Zukunft der<br>digitalen Bildung:<br>Wie Technologie<br>das
                            Lernen<br>verändert</h1>

                        <div class="meta-info">
                            <span class="meta-item">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                    <circle cx="12" cy="7" r="4"></circle>
                                </svg>
                                <span id="post-author">Redaktion</span>
                            </span>
                            <span class="meta-item">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                <span id="post-date">15.04.2026</span>
                            </span>
                            <span class="meta-item">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="icon"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                                <span id="post-comments">-</span>
                            </span>
                        </div>
                    </div>

                    <div class="image-group">
                        <div class="img-wrapper main-img">
                            <img id="post-image" src="https://placehold.co/800x450/333/fff?text=Lade+Artikel..." alt="Thumbnail">
                            <div class="overlay-scribble"></div>
                        </div>
                    </div>
                </aside>

                <!-- Right Content: 2-Column Text Flow -->
                <main class="text-content" id="post-content">
                    <p class="lead-text">Lade Inhalt...</p>
                </main>

                <!-- Overlay with Blur and Gradient on the 2nd text column -->
                <div class="footer-overlay">
                    <div class="blur-gradient"></div>
                    <div class="cta-content">
                        <p class="cta-label">Mehr lesen auf</p>
                        <a href="https://kaktus-bzm.de" class="cta-link" id="post-link">kaktus-bzm.de</a>
                    </div>
                </div>

                <div class="page-number num-1">1</div>
                <div class="page-number num-2">2</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://www.kaktus-bzm.de/wp-json/wp/v2/posts?per_page=10&orderby=date&order=desc&_embed=1';
        const CACHE_KEY = 'kaktus_posts';
        const CACHE_TIME = 60 * 60 * 1000;

        let allPosts = [];
        let currentIndex = 0;

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return `${String(date.getDate()).padStart(2, '0')}.${String(date.getMonth() + 1).padStart(2, '0')}.${date.getFullYear()}`;
        }

        async function fetchPosts() {
            try {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { data, timestamp } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_TIME) {
                        allPosts = data;
                        return;
                    }
                }

                const response = await fetch(API_URL);
                const rawPosts = await response.json();

                allPosts = await Promise.all(rawPosts.map(async (post) => {
                    let commentCount = 0;
                    try {
                        const commRes = await fetch(`https://www.kaktus-bzm.de/wp-json/wp/v2/comments?post=${post.id}&per_page=1`);
                        commentCount = commRes.headers.get('X-WP-Total') || 0;
                    } catch (e) {}

                    let featuredImg = post._embedded?.['wp:featuredmedia']?.[0]?.source_url;
                    if (!featuredImg || post._embedded?.['wp:featuredmedia']?.[0]?.code === 'rest_forbidden') {
                        const doc = new DOMParser().parseFromString(post.content.rendered, 'text/html');
                        const firstImg = doc.querySelector('img');
                        featuredImg = firstImg ? firstImg.src : 'wp_kaktus.png';
                    }

                    return {
                        title: post.title.rendered,
                        author: post._embedded?.author?.[0]?.name || 'Redaktion',
                        date: formatDate(post.date),
                        content: post.content.rendered,
                        comments: commentCount,
                        link: post.link,
                        image: featuredImg
                    };
                }));

                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    data: allPosts,
                    timestamp: Date.now()
                }));
            } catch (error) {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) allPosts = JSON.parse(cached).data;
            }
        }

        function updateUI(data) {
            if (!data) return;
            document.querySelector('.headline').innerHTML = data.title;
            document.getElementById('post-date').innerText = data.date;
            document.getElementById('post-author').innerText = data.author;
            document.getElementById('post-comments').innerText = data.comments;
            document.getElementById('post-image').src = data.image;
            
            // Inhalt säubern (Polls etc.)
            const contentEl = document.getElementById('post-content');
            let content = data.content;

            // Global "Wird geladen" entfernen (sehr vorsichtig)
            content = content.replace(/Wird geladen\s*\.\.\./g, '');
            contentEl.innerHTML = content;
            
            // Poll-Bereinigung & CTA (Nur Haupt-Container, um Duplikate zu vermeiden)
            const polls = contentEl.querySelectorAll('.wp-polls');
            polls.forEach(poll => {
                // Nur wenn noch keine Note da ist
                if (!poll.querySelector('.custom-poll-note')) {
                    // Verstecke alles Unnötige innerhalb der Poll
                    const toHide = poll.querySelectorAll('input[type="button"], input[type="submit"], [id*="loading"], .wp-polls-loading, a[href*="ViewPollResults"]');
                    toHide.forEach(el => { el.style.display = 'none'; el.setAttribute('hidden', 'true'); });
                    
                    // CTA einfügen
                    const voteNote = document.createElement('div');
                    voteNote.className = 'custom-poll-note';
                    voteNote.innerHTML = 'Selber abstimmen auf <b>kaktus-bzm.de</b>';
                    poll.appendChild(voteNote);
                }
            });

            document.getElementById('post-link').href = data.link;
        }

        async function loadInitial() {
            await fetchPosts();
            if (allPosts.length > 0) updateUI(allPosts[currentIndex]);
        }

        function next() {
            if (allPosts.length === 0) return;
            currentIndex = (currentIndex + 1) % allPosts.length;
            updateUI(allPosts[currentIndex]);
        }

        function prev() {
            if (allPosts.length === 0) return;
            currentIndex = (currentIndex - 1 + allPosts.length) % allPosts.length;
            updateUI(allPosts[currentIndex]);
        }

        window.onload = loadInitial;

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            if (e.key === 'ArrowRight') next();
            else if (e.key === 'ArrowLeft') prev();
        });
    </script>
</body>

</html>
